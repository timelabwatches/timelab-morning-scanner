name: TIMELAB Morning Scan

on:
  workflow_dispatch:
  schedule:
    - cron: "0 7 * * *"

jobs:
  run-scan:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Ensure state folder exists
        run: |
          mkdir -p state

      - name: Run TIMELAB eBay scan
        env:
          EBAY_CLIENT_ID: ${{ secrets.EBAY_CLIENT_ID }}
          EBAY_CLIENT_SECRET: ${{ secrets.EBAY_CLIENT_SECRET }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          MIN_NET_EUR: "20"
          MIN_NET_ROI: "0.05"
          MIN_MATCH_SCORE: "60"
          ALLOW_FAKE_RISK: "low,medium"
          BUY_MAX_MULT: "1.25"
          CATWIKI_COMMISSION: "0.125"
          PAYMENT_PROCESSING: "0.0"
          PACKAGING_EUR: "5.0"
          MISC_EUR: "5.0"
          SHIP_ARBITRAGE_EUR: "35.0"
          EFFECTIVE_TAX_RATE_ON_PROFIT: "0.15"
          HTTP_TIMEOUT: "25"
          EBAY_MARKETPLACE_ID: "EBAY_ES"
          EBAY_LIMIT: "50"
          EBAY_THROTTLE_S: "0.35"
          EBAY_DEFAULT_CATEGORY_ID: "31387"
          DETAIL_FETCH_N: "35"
          EBAY_DETAIL_THROTTLE_S: "0.20"
          EBAY_ALLOWED_CATEGORY_IDS: "31387"
          TG_MAX_LEN: "3500"
          COOLDOWN_HOURS: "72"
          PRICE_DROP_REPOST: "0.10"
          TARGET_LIST_PATH: "target_list.json"
          MODEL_MASTER_PATH: "data/model_master.json"
          TARGET_STATS_PATH: "data/target_stats.json"
          EBAY_STATE_PATH: "state/state_ebay.json"
        run: |
          python main.py

      - name: Commit updated state
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add state/state_ebay.json
          git diff --cached --quiet || git commit -m "Update eBay scanner state"
          git push