name: timelab-vinted-probe

# Manual-only. Disposable workflow for diagnostic. Delete after Vinted decision.
on:
  workflow_dispatch:

jobs:
  probe:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install requests
        run: |
          python -m pip install --upgrade pip
          pip install requests

      - name: Run Vinted probe
        run: |
          python probes/vinted_probe.py
