name: timelab-morning-scanner-v2

on:
  workflow_dispatch:
  schedule:
    - cron: "30 7 * * *"   # 07:30 UTC = 08:30 Madrid (invierno) / 09:30 (verano)

permissions:
  contents: write

jobs:

  # ─────────────────────────────────────────────
  # JOB 1 — eBay API scanner
  # ─────────────────────────────────────────────
  run-ebay-scanner:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests

      - name: Run eBay scanner
        continue-on-error: true
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          EBAY_CLIENT_ID: ${{ secrets.EBAY_CLIENT_ID }}
          EBAY_CLIENT_SECRET: ${{ secrets.EBAY_CLIENT_SECRET }}
          MIN_NET_EUR: "20"
          MIN_NET_ROI: "0.05"
          MIN_MATCH_SCORE: "45"
          ALLOW_FAKE_RISK: "low,medium"
          BUY_MAX_MULT: "1.25"
          CATWIKI_COMMISSION: "0.125"
          PACKAGING_EUR: "5.0"
          MISC_EUR: "5.0"
          SHIP_ARBITRAGE_EUR: "35.0"
          EFFECTIVE_TAX_RATE_ON_PROFIT: "0.15"
          HTTP_TIMEOUT: "25"
          EBAY_MARKETPLACE_ID: "EBAY_ES"
          EBAY_LIMIT: "50"
          EBAY_THROTTLE_S: "0.35"
          EBAY_DEFAULT_CATEGORY_ID: "31387"
          EBAY_ALLOWED_CATEGORY_IDS: "31387"
          DETAIL_FETCH_N: "35"
          EBAY_DETAIL_THROTTLE_S: "0.20"
          TG_MAX_LEN: "3500"
          COOLDOWN_HOURS: "48"
          PRICE_DROP_REPOST: "0.10"
          TARGET_LIST_PATH: "target_list.json"
          MODEL_MASTER_PATH: "data/model_master.json"
          COMPARABLES_PATH: "data/market_comp_db.json"
          TARGET_STATS_PATH: "data/target_stats.json"
          EBAY_STATE_PATH: "state/state_ebay.json"
        run: |
          python main.py  # BUG-4 FIX: replaced scanner.py (old) with main.py (new pipeline)

      - name: Commit eBay state
        if: always()
        run: |
          set -e
          git config user.name "timelab-bot"
          git config user.email "timelab-bot@users.noreply.github.com"
          git add state/state_ebay.json || true
          if ! git diff --cached --quiet; then
            git commit -m "Update eBay state [main.py]" || true
            git push || true
          fi

  # ─────────────────────────────────────────────
  # JOB 2 — CashConverters scraper
  # ─────────────────────────────────────────────
  run-cashconverters-scanner:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests beautifulsoup4 lxml

      - name: Run CashConverters scanner
        continue-on-error: true
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          CC_MAX_ITEMS: "500"
          CC_TIMEOUT: "20"
          CC_THROTTLE_S: "0.7"
          CC_MIN_MATCH_SCORE: "55"
          CC_MIN_NET_EUR: "20"
          CC_MIN_NET_ROI: "0.08"
          CLOSE_HAIRCUT: "0.90"
          CC_GOOD_BRANDS_TARGET: "60"
          CC_DEBUG: "1"
        run: |
          python cashconverters_scanner.py

  # ─────────────────────────────────────────────
  # JOB 3 — Vinted scanner
  # Same schedule as eBay/CC. Separate Telegram channel.
  # ─────────────────────────────────────────────
  run-vinted-scanner:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests

      - name: Run Vinted scanner
        continue-on-error: true
        env:
          TELEGRAM_BOT_TOKEN_VINTED: ${{ secrets.TELEGRAM_BOT_TOKEN_VINTED }}
          TELEGRAM_BOT_TOKEN:        ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID_VINTED:   ${{ secrets.TELEGRAM_CHAT_ID_VINTED }}
          TELEGRAM_CHAT_ID:          ${{ secrets.TELEGRAM_CHAT_ID }}
          VT_MAX_ITEMS_PER_QUERY:    "60"
          VT_PAGES_PER_QUERY:        "3"
          VT_THROTTLE_S:             "1.2"
          VT_TIMEOUT:                "20"
          VT_MIN_MATCH_SCORE:        "55"
          VT_MIN_NET_EUR:            "30"
          VT_MIN_NET_ROI:            "0.15"
          VT_CLOSE_HAIRCUT:          "0.85"
          VT_COOLDOWN_HOURS:         "48"
          VT_DEBUG:                  "1"
          CATWIKI_COMMISSION_RATE:   "0.125"
          CATWIKI_COMMISSION_VAT:    "0.21"
          SHIP_ARB_EUR:              "35"
        run: |
          python vinted_scanner.py

      - name: Commit Vinted state
        if: always()
        run: |
          set -e
          git config user.name "timelab-bot"
          git config user.email "timelab-bot@users.noreply.github.com"
          git add state/state_vinted.json 2>/dev/null || true
          if ! git diff --cached --quiet; then
            git commit -m "Update Vinted scanner state [skip ci]"
            git pull --rebase origin main || true
            git push origin main || true
          fi
